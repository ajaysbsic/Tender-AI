<mat-toolbar color="primary" class="app-toolbar">
  <button mat-icon-button (click)="sidenav.toggle()" *ngIf="isLoggedIn">
    <mat-icon>menu</mat-icon>
  </button>
  
  <span class="spacer"></span>
  <span class="app-title">{{ title }}</span>
  <span class="spacer"></span>

  <div class="language-section">
    <button mat-icon-button [matMenuTriggerFor]="languageMenu">
      <mat-icon>language</mat-icon>
      <span class="lang-label">{{ currentLanguage | uppercase }}</span>
    </button>
    <mat-menu #languageMenu="matMenu">
      <button mat-menu-item *ngFor="let lang of languages"
              (click)="changeLanguage(lang.code)"
              [class.active]="currentLanguage === lang.code">
        <span>{{ lang.label }}</span>
      </button>
    </mat-menu>
  </div>

  <div *ngIf="isLoggedIn" class="user-section">
    <span class="user-email">{{ userEmail }}</span>
    <button mat-icon-button [matMenuTriggerFor]="userMenu">
      <mat-icon>account_circle</mat-icon>
    </button>
    <mat-menu #userMenu="matMenu">
      <button mat-menu-item (click)="navigateTo('/profile')">
        <mat-icon>edit</mat-icon>
        <span>Edit Profile</span>
      </button>
      <mat-divider></mat-divider>
      <button mat-menu-item (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span>Logout</span>
      </button>
    </mat-menu>
  </div>
</mat-toolbar>

<mat-sidenav-container class="app-container">
  <mat-sidenav #sidenav mode="side" [opened]="isLoggedIn" class="app-sidenav">
    <mat-nav-list>
      <mat-list-item *ngFor="let item of navItems" (click)="navigateTo(item.route)" class="nav-item">
        <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
        <span matListItemTitle>{{ item.label }}</span>
      </mat-list-item>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="app-content">
    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
